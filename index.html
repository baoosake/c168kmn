<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

/* VIDEO */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
pointer-events:none;
}

body::after{
content:"";

top:0;

width:100%;
height:100%;

}

/* CONTAINER */

.container{
width:360px;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
}

/* GLOBE */

.globe{
position:fixed;
top:50%;
width:200px;
height:200px;
transform:translateY(-60%);
z-index:2;
cursor:pointer;
}

.globe-text{
position:fixed;
top:65%;
font-size:16px;
font-weight:bold;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
}

#vietnam{ left:40px; }
#singapore{ right:40px; }

#vn-text{
left:40px;
width:200px;
text-align:center;
}

#sg-text{
right:40px;
width:200px;
text-align:center;
}

/* LOGO */

.logos{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
margin-bottom:25px;
}

.logo{
height:70px;
object-fit:contain;
animation:intro 1.2s ease;
}

@keyframes intro{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h2{
font-size:14px;
opacity:0.8;
}

h1{
font-size:36px;
margin-bottom:25px;
font-weight:800;

background:linear-gradient(90deg,#d8874d,#f97501,#5765e8);
background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 5s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:300%}
}

.buttons{
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
padding:15px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
border:2px solid #00ffff;

box-shadow:
0 0 5px #00ffff,
0 0 15px #00ffff,
0 0 30px #00ffff;

transition:0.3s;
}

.btn:hover{
background:#00ffff;
color:black;
transform:scale(1.05);
}

.social{
margin-top:20px;
display:flex;
justify-content:center;
gap:20px;
font-size:22px;
}

.social a{
color:white;
transition:0.3s;
}

.social a:hover{
color:#00ffff;
transform:scale(1.3);
}

.live{
margin-top:20px;
font-size:14px;
color:#00ffff;

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;

.intro-logo{
width:220px;
animation:introZoom 2s ease;

@keyframes introZoom{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}

ĐĂNG KÝ NGAY

<div class="social">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* INTRO */

setTimeout(function(){
document.getElementById("intro").style.display="none";
},3000);


/* GLOBE */

function createGlobe(id, flag, link){

const container = document.getElementById(id);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
container.clientWidth/container.clientHeight,
0.1,
1000
);

camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);
container.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff,2);
light.position.set(3,3,3);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.7));

const geometry = new THREE.SphereGeometry(1,64,64);

const loader = new THREE.TextureLoader();
const texture = loader.load(flag);

texture.wrapS = THREE.RepeatWrapping;
texture.repeat.set(2,1);

const material = new THREE.MeshPhysicalMaterial({
map:texture,
metalness:0.5,
roughness:0.25,
clearcoat:1,
clearcoatRoughness:0
});

const sphere = new THREE.Mesh(geometry,material);
scene.add(sphere);

container.addEventListener("click",()=>{
window.location.href = link;
});

function animate(){
requestAnimationFrame(animate);
sphere.rotation.y += 0.01;
renderer.render(scene,camera);
}

animate();

}

createGlobe("vietnam","https://flagcdn.com/w640/vn.png","https://c168kmn.top");
createGlobe("singapore","https://flagcdn.com/w640/sg.png","https://c168kmn.top");


/* USER COUNTER */

let users = 50000;

setInterval(function(){

users += Math.floor(Math.random()*200);

if(users > 100000){
users = 50000;
}

document.getElementById("users").innerText =
users.toLocaleString();

},2000);

</script>
