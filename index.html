<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>


setTimeout(()=>{
document.getElementById("intro").style.display="none"
},4000)


function createGlobe(id,flag,link){

const container=document.getElementById(id)

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(60,1,0.1,1000)

camera.position.z=3

const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true})
renderer.setSize(65,65)

container.appendChild(renderer.domElement)

const light=new THREE.PointLight(0xffffff,2)
light.position.set(3,3,3)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,0.7))

const geometry=new THREE.SphereGeometry(1,64,64)

const texture=new THREE.TextureLoader().load(flag)

const material=new THREE.MeshStandardMaterial({map:texture})

const sphere=new THREE.Mesh(geometry,material)

scene.add(sphere)

container.onclick=()=>window.location.href=link

function animate(){
requestAnimationFrame(animate)
sphere.rotation.y+=0.01
renderer.render(scene,camera)
}

animate()

}

createGlobe("vietnam","https://flagcdn.com/w640/vn.png","https://c168kmn.top")
createGlobe("srilanka","https://flagcdn.com/w640/lk.png","https://c168kmn.top")
createGlobe("hongkong","https://flagcdn.com/w640/hk.png","https://c168kmn.top")
createGlobe("singapore","https://flagcdn.com/w640/sg.png","https://c168kmn.top")


let users=50000

setInterval(()=>{

users+=Math.floor(Math.random()*150)

if(users>100000){users=50000}

document.getElementById("users").innerText=
users.toLocaleString()

},2000)

</script>
